version: "3.8"

services:
  chordflow:
    image: ghcr.io/zerodevi1/chordflow:latest
    container_name: chordflow
    ports:
      - "3001:3001"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # 如需自定义端口，取消下行注释并修改
      # - PORT=3001
    volumes:
      # 数据持久化：SQLite 数据库与上传文件
      - chordflow-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "const{get}=require('http');get('http://localhost:3001/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  chordflow-data:
    driver: local
