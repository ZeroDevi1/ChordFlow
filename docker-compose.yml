version: "3.8"

services:
  chordflow:
    image: ghcr.io/zerodevi1/chordflow:latest
    container_name: chordflow
    ports:
      - "3001:3001"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # 如需自定义端口，取消下行注释并修改
      # - PORT=3001
    volumes:
      # 数据持久化：SQLite 数据库与上传文件
      - chordflow-data:/app/data
      # TLS 证书持久化（首次启动自动生成，避免容器重建后重新信任）
      - chordflow-certs:/app/certs
    healthcheck:
      # 兼容 HTTPS（自签名证书跳过验证）
      test: ["CMD", "node", "-e", "const{get}=require(require('fs').existsSync('/app/certs/cert.pem')?'https':'http');get({hostname:'localhost',port:3001,path:'/health',rejectUnauthorized:false},r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  chordflow-data:
    driver: local
  chordflow-certs:
    driver: local
